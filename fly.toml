# fly.toml — Incenva Scraper (multi-tenant background worker)
#
# This is a pure background worker — no HTTP services.
# Each machine run scrapes all active tenants and exits (RUN_ONCE=true).
# Schedule runs via: fly machine run --schedule "0 */6 * * *"
#
# Tenant config: config/tenants.json (bundled in the image)
# Per-tenant DB URLs: fly secrets (TENANT_<ID>_DB_URL)

app = "incenva-scraper"
primary_region = "iad"

[build]

[env]
  LOG_LEVEL        = "info"
  LOG_FORMAT       = "json"
  RUN_ONCE         = "true"
  SCRAPER_VERSION  = "1.0"
  TENANTS_FILE     = "/app/config/tenants.json"
  SCRAPER_INTERVAL = "@every 6h"

# No [[services]] block — this app has no HTTP endpoints.
# Fly will not assign a public IP or health-check port.

[deploy]
  strategy = "immediate"
